services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ${SQL_CONTAINER_NAME:-msbi2-mssql}
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA:-Y}
      MSSQL_PID: ${MSSQL_PID:-Developer}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Passw0rd123!}
    ports:
      - "${MSSQL_TCP_PORT:-1433}:1433"
    volumes:
      - msbi2-mssql-data:/var/opt/mssql
      - ./artifacts/backups:/var/opt/mssql/backup
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "SQLCMD=$$(command -v /opt/mssql-tools18/bin/sqlcmd || command -v /opt/mssql-tools/bin/sqlcmd); $$SQLCMD -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" >/dev/null"
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  msbi2-mssql-data:
